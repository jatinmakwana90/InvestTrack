name: Build InvestTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: |
          unzip InvestTrack.zip
          cp -r InvestTrack/. .
          rm -rf InvestTrack InvestTrack.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.txt; grep "^e:" build_output.txt || true; exit ${PIPESTATUS[0]}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InvestTrack-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_output.txt
          retention-days: 7
